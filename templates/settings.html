<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.container{

width:90%;

max-width:950px;

}

h1{

color:white;

text-align:center;

margin-bottom:40px;

font-size:40px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:30px;

}

.card{

background:white;

padding:35px;

border-radius:20px;

text-align:center;

box-shadow:0 15px 30px rgba(0,0,0,.20);

transition:.35s;

}

.card:hover{

transform:translateY(-8px);

}

.icon{

font-size:60px;

margin-bottom:20px;

}

.card h2{

color:#0d6efd;

margin-bottom:20px;

}

.card p{

color:#666;

line-height:28px;

margin-bottom:25px;

}

.btn{

display:inline-block;

padding:14px 28px;

border-radius:10px;

text-decoration:none;

font-size:18px;

font-weight:bold;

color:white;

transition:.3s;

}

.email{

background:#198754;

}

.admin{

background:#6f42c1;

}

.back{

background:#6c757d;

display:block;

width:280px;

margin:45px auto 0;

text-align:center;

}

.btn:hover{

transform:translateY(-3px);

}

@media(max-width:768px){

h1{

font-size:32px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>

⚙ System Settings

</h1>

<div class="grid">

<div class="card">

<div class="icon">

📧

</div>

<h2>

Email Settings

</h2>

<p>

Configure the email address that receives PPE violation alerts.

</p>

<a

href="{{ url_for('email_settings') }}" class="btn email">

Open

</a>

</div>

<div class="card">

<div class="icon">

🔐

</div>

<h2>

Admin Credentials

</h2>

<p>

Update administrator username and password securely.

</p>

<a href="{{ url_for('admin_credentials') }}" class="btn admin">

Open

</a>

</div>

</div>

<a

href="{{ url_for('admin') }}" class="btn back">

⬅ Back to Admin Panel

</a>

</div>

</body>

</html>
